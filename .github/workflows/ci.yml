name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ─── Fast required checks ───
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build -w @itsjust/core

      - run: npm run lint

      - run: npm run format:check

      - run: npx tsc --noEmit

      - run: npm test -- --coverage
        env:
          CI: true

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=moderate
        # Moderate vulnerabilities don't block releases, but are logged.
        # To make blocking: remove continue-on-error and set audit-level=high.
        continue-on-error: true

      - name: Preflight check
        run: node scripts/preflight.mjs

  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check dead links in markdown
        run: |
          # Simple check for dead relative links in markdown files
          # This finds [](...) patterns and checks if the target exists
          node -e "
            const fs = require('fs');
            const path = require('path');
            let errors = 0;
            const mdFiles = fs.readdirSync('.', { recursive: true }).filter(f => typeof f === 'string' && f.endsWith('.md'));
            for (const file of mdFiles) {
              const content = fs.readFileSync(file, 'utf-8');
              const links = [...content.matchAll(/\[([^\]]*)\]\(([^)]+)\)/g)];
              for (const [, , url] of links) {
                if (url.startsWith('http') || url.startsWith('#') || url.startsWith('mailto:')) continue;
                const resolved = path.resolve(path.dirname(file), url.split('#')[0]);
                if (!fs.existsSync(resolved)) {
                  console.error('Dead link in ' + file + ' -> ' + url);
                  errors++;
                }
              }
            }
            if (errors > 0) process.exit(1);
            console.log('All markdown links valid.');
          "

      - name: Check code fence languages
        run: |
          # Ensure fenced code blocks have a language tag
          node -e "
            const fs = require('fs');
            let errors = 0;
            const mdFiles = fs.readdirSync('.', { recursive: true }).filter(f => typeof f === 'string' && f.endsWith('.md'));
            for (const file of mdFiles) {
              const content = fs.readFileSync(file, 'utf-8');
              const bad = [...content.matchAll(/\`\`\`\s*\n/g)];
              if (bad.length > 0) {
                console.error(file + ' has ' + bad.length + ' code fence(s) without language tag');
                errors++;
              }
            }
            if (errors > 0) process.exit(1);
            console.log('All code fences have language tags.');
          "

  # ─── Slow optional checks ───
  build-and-e2e:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Bundle size check
        run: node scripts/check-bundle-size.mjs

      - name: E2E tests
        run: npm run test:e2e
